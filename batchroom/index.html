<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Batch Room - Create and share nostalgic memories with your college batch">
    <title>Batch Room</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="dust" aria-hidden="true"></canvas>

<div class="page-wrapper">

    <header class="top-bar">
        <div class="logo" role="heading" aria-level="1">
            Batch Room
        </div>

        <button id="logoutBtn" class="btn btn-secondary" style="display:none" aria-label="Sign out from your account">
            Sign Out
        </button>

    </header>

    <main>
        <section class="hero">
            <h1 class="hero-title">Batch Room</h1>
            <div class="hero-intro">
                <p class="hero-line hero-line-1">
                    <span class="typing-text"></span>
                    <span class="cursor">|</span>
                </p>
                <p class="hero-line hero-line-2">
                    <span class="typing-text"></span>
                    <span class="cursor">|</span>
                </p>
                <p class="hero-line hero-line-3">
                    <span class="typing-text"></span>
                    <span class="cursor">|</span>
                </p>
                <p class="hero-line hero-line-4">
                    <span class="typing-text"></span>
                    <span class="cursor">|</span>
                </p>
                <p class="hero-line hero-line-5">
                    <span class="typing-text"></span>
                    <span class="cursor">|</span>
                </p>
            </div>

            <button id="loginBtn" class="btn btn-primary hero-button" aria-label="Sign in with Google">
                Sign in with Google to enter your wall
            </button>
        </section>

        <section id="loginSection" class="login-message">
        </section>

        <section id="appSection" style="display:none" aria-live="polite">
            <section class="section-card">
                <h2 class="section-title">Start a Memory Wall for Your Batch</h2>
                <p class="section-subtitle">
                    Tell us where and when your batch graduated
                </p>

                <form class="form-grid" novalidate>
                    <div class="form-group">
                        <label for="institutionInput" class="form-label">Institution</label>
                        <input id="institutionInput" placeholder="Your college or institution" autocomplete="organization" aria-describedby="institutionHelp"/>
                        <ul id="institutionSuggestions" class="suggestion-list" role="listbox" aria-label="Institution suggestions"></ul>
                    </div>

                    <div class="form-group">
                        <label for="yearSelect" class="form-label">Graduation Year</label>
                        <select id="yearSelect" aria-describedby="yearHelp">
                            <option value="">Select year</option>
                        </select>
                    </div>
                </form>

                <div id="batchNamePreview" class="batch-name-preview" style="display:none" role="status" aria-live="polite">
                    <p class="preview-label">Your memory wall will be named</p>
                    <p id="previewName" class="preview-name"></p>
                </div>

                <button id="createBatchBtn" class="btn btn-primary btn-full" disabled aria-label="Create memory wall">
                    Your Batch Walls →
                </button>
            </section>

            <section class="batches-section">
                <div class="section-header">
                    <h2>Your Memory Walls</h2>
                    <p>Memories shared by your batch.</p>
                </div>

                <ul id="batchList" class="batch-grid" role="list" aria-label="Your memory walls"></ul>
            </section>
        </section>
    </main>

</div>

<div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

<script type="module" src="./app.js"></script>
<script src="dust.js"></script>
<script src="animations.js"></script>

</body>
</html>
