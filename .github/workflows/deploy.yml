name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # Triggers when you push to master

permissions:
  contents: write # Needed to push to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Note: We will add the API key hiding logic here in Step 2

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: . # Deploys the whole root directory
          keep_files: false
